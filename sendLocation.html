<!DOCTYPE html>
<html>
<head>
<title>Location Sender</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 80px;
    background-color: #f5f5f5;
}

.container{
    background: white;
    padding: 40px;
    border-radius: 10px;
    width: 320px;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

button{
    padding: 12px 20px;
    font-size: 16px;
    margin: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.startBtn{
    background-color: #28a745;
    color: white;
}

.stopBtn{
    background-color: #dc3545;
    color: white;
}

button:hover{
    opacity: 0.9;
}

#statusText{
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Location Sender</h2>

<button class="startBtn" onclick="startSending()">Start Sending Location</button>
<button class="stopBtn" onclick="stopSending()">Stop</button>

<p id="statusText">Waiting...</p>

</div>

<script>

let locationInterval = null;

function startSending(){

    if(locationInterval !== null){
        return; // prevent multiple timers
    }

    document.getElementById("statusText").innerText = "Starting location updates...";
    console.log("Starting location updates every 5 seconds");

    sendLocation(); // send immediately once

    locationInterval = setInterval(sendLocation, 5000);
}

function stopSending(){

    if(locationInterval !== null){
        clearInterval(locationInterval);
        locationInterval = null;
        document.getElementById("statusText").innerText = "Location updates stopped.";
        console.log("Stopped sending location.");
    }

}

function sendLocation(){

    document.getElementById("statusText").innerText = "Requesting location...";
    console.log("Requesting location from browser...");

    navigator.geolocation.getCurrentPosition(function(position){

        let lat = position.coords.latitude;
        let lon = position.coords.longitude;

        console.log("Got coordinates! Latitude:", lat, "Longitude:", lon);

        document.getElementById("statusText").innerText = "Sending to AWS...";

        fetch("https://2kdoa4ecec5a5kn7jtpabfbuci0wckhs.lambda-url.us-east-2.on.aws/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                lat: lat,
                lon: lon
            })
        })
        .then(response => response.json())
        .then(data => {

            console.log("Success! AWS responded with:", data);
            document.getElementById("statusText").innerText = 
                "Success! Coordinates sent.";

        })
        .catch((error) => {

            console.error("Error sending to AWS:", error);
            document.getElementById("statusText").innerText = 
                "Error sending location.";

        });

    }, function(error){

        console.error("Geolocation error:", error.message);
        document.getElementById("statusText").innerText = 
            "Location access denied or failed.";

    });

}

</script>

</body>
</html>
